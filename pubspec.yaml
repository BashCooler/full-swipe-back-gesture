name: full_swipe_back_gesture
description: "iOS-style full-screen back swipe gesture PageRoute that works seamlessly with horizontal scrollables"
# Remove publish_to to allow publishing

# Version follows semantic versioning (https://semver.org/)
version: 0.1.0

environment:
  sdk: ^3.8.1

# Dependencies for the package
dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# Flutter package configuration
flutter:

repository: https://github.com/ssan9woo/full-swipe-back-gesture
homepage: https://github.com/ssan9woo/full-swipe-back-gesture
issue_tracker: https://github.com/ssan9woo/full-swipe-back-gesture/issues
topics:
  - gesture
  - navigation
  - page-route
  - ios
  - swipe
license: MIT
